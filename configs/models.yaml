# Model configurations — paths, tokenizer options, chat templates.
# Each entry is the canonical name used throughout the codebase.
#
# PRIMARY (default) model: llama-3-8b-instruct.
# LLaMA-2 entries are retained as secondary targets — re-enable once
# meta-llama/Llama-2-7b-chat-hf access is granted on HuggingFace.

default_model: llama-3-8b-instruct

defaults:
  torch_dtype: bfloat16
  device_map: auto
  trust_remote_code: false
  attn_implementation: eager         # required for gradient-preserving attention hooks
  low_cpu_mem_usage: true

models:
  # ---- PRIMARY ---------------------------------------------------------
  llama-3-8b-instruct:
    hf_id: meta-llama/Meta-Llama-3-8B-Instruct
    family: llama
    n_layers: 32
    n_heads: 32
    d_model: 4096
    context_len: 8192
    chat_template: llama3
    # positions of system-prompt tokens are identified at runtime via
    # AttentionExtractor.locate_system_span() using the tokenized template.

  qwen-2.5-7b-instruct:
    hf_id: Qwen/Qwen2.5-7B-Instruct
    family: qwen2
    n_layers: 28
    n_heads: 28
    n_kv_heads: 4           # GQA
    d_model: 3584
    context_len: 131072
    chat_template: auto

  # ---- SECONDARY (access granted) --------------------------------------
  mistral-7b-instruct-v0.1:
    hf_id: mistralai/Mistral-7B-Instruct-v0.1
    family: mistral
    n_layers: 32
    n_heads: 32
    d_model: 4096
    context_len: 8192
    chat_template: mistral

  gpt-oss-20b:
    hf_id: openai/gpt-oss-20b
    family: gpt-oss
    # 22B total params, 3.6B active (MoE: 32 experts, top-4 routing).
    # GQA: 64 query heads, 8 KV heads (group_size=8), head_dim=64.
    # Alternating sliding_attention (window=128) / full_attention (12 + 12).
    # MXFP4 quantisation on MoE weights; attention + embed stay bf16.
    # Requires trust_remote_code and transformers >= 4.55 (dev).
    n_layers: 24
    n_heads: 64             # num_attention_heads (queries)
    n_kv_heads: 8           # num_key_value_heads (GQA)
    d_model: 2880           # hidden_size
    context_len: 131072     # max_position_embeddings (yarn RoPE)
    chat_template: auto     # harmony format; tokenizer handles it
    sliding_window: 128     # for sliding_attention layers
    vocab_size: 201088
    trust_remote_code: true

  # ---- SECONDARY (access pending / optional) ---------------------------
  llama-2-7b-chat:
    hf_id: meta-llama/Llama-2-7b-chat-hf
    family: llama
    n_layers: 32
    n_heads: 32
    d_model: 4096
    context_len: 4096
    chat_template: llama2

  llama-2-13b-chat:
    hf_id: meta-llama/Llama-2-13b-chat-hf
    family: llama
    n_layers: 40
    n_heads: 40
    d_model: 5120
    context_len: 4096
    chat_template: llama2

  mistral-7b-instruct-v0.3:
    hf_id: mistralai/Mistral-7B-Instruct-v0.3
    family: mistral
    n_layers: 32
    n_heads: 32
    d_model: 4096
    context_len: 32768
    chat_template: mistral

  gemma-2-9b-it:
    hf_id: google/gemma-2-9b-it
    family: gemma2
    n_layers: 42
    n_heads: 16
    d_model: 3584
    context_len: 8192
    chat_template: gemma

# Judge model for harmful-content classification in exp2.
judges:
  llama-3-70b-instruct:
    hf_id: meta-llama/Meta-Llama-3-70B-Instruct
    role: primary
  gpt-4-turbo:
    api: openai
    model: gpt-4-turbo-2024-04-09
    role: secondary           # inter-rater agreement / ablation

# Safety filter models.
filters:
  llama-guard-3-8b:
    hf_id: meta-llama/Llama-Guard-3-8B
  perplexity-reference:
    hf_id: gpt2-large         # independent PPL model (NOT the attacked model)
